services:
  mysql:
    image: mysql:8.4
    container_name: cylinder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cylinder_db
    ports:
      - "3306:3306"
    volumes:
      - cylinder_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cylinder_mysql_data:
